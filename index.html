<!DOCTYPE html>
<html lang="es">

<!-- =====================================================
MODULO 0
CONFIGURACION GENERAL DEL HTML
===================================================== -->

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REGISTRO DOCUMENTAL</title>

<link rel="icon" type="image/png" href="icono.png">
<link rel="apple-touch-icon" href="icono.png">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<!-- =====================================================
MODULO 1
ESTILOS DEL SISTEMA
===================================================== -->

<style>

body{
font-family:"Segoe UI",Arial,sans-serif;
background:#dfeaf5;
margin:0;
padding:20px;
color:#243447;
}

h1{text-align:center;margin:0 0 18px 0;}

h3{text-align:center;margin:0 0 12px 0;font-size:18px;}

.layout{
display:grid;
grid-template-columns:320px 1fr;
gap:18px;
}

.panel{
background:#fff;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
padding:16px;
}

label{font-size:12px;font-weight:700;margin-top:8px;display:block;}

input,select,textarea{
width:100%;
margin-top:4px;
padding:8px;
border-radius:8px;
border:1px solid #cfd8e3;
}

textarea{min-height:60px;}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.actions{display:flex;gap:8px;margin-top:12px;}

button{
border:none;
border-radius:8px;
padding:8px 10px;
background:#34495e;
color:#fff;
cursor:pointer;
}

button.sec{background:#7f8c8d;}

.stats{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-bottom:12px;
}

.card{
background:#f7fafc;
padding:10px;
border-radius:10px;
text-align:center;
}

.card b{font-size:20px;}

.secret{background:#ffecec;}
.warning{background:#fff4cc;}

.search{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:10px;
}

.export{
display:flex;
gap:8px;
justify-content:flex-end;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
}

th{background:#eef4f9;}

.plazoRojo{background:#ff3b30;color:#fff;}
.plazoVerde{background:#b9f6ca;}
.plazoAmarillo{background:#fff176;}
.plazoVencido{background:#b3e5fc;}

.secret-cell{background:#c0392b;color:#fff;}

</style>
</head>

<body>

<!-- =====================================================
MODULO 2
TITULO
===================================================== -->

<h1>REGISTRO DOCUMENTAL</h1>

<div class="layout">

<!-- =====================================================
MODULO 3
FORMULARIO
===================================================== -->

<div class="panel">

<h3>REGISTRAR AQUÍ</h3>

<label>Fecha</label>
<input type="date" id="fecha">

<label>Número</label>
<input id="numero">

<div class="row2">
<input id="identMateria" placeholder="Ident Materia">
<input id="identDoc" placeholder="Ident Documento">
</div>

<label>Autoridad</label>
<input id="autoridad">

<div class="row2">
<input id="ejs" placeholder="Ejs">
<input id="hjs" placeholder="Hjs">
</div>

<textarea id="materia" placeholder="Materia"></textarea>

<div class="row2">
<input type="date" id="plazo">
<input id="procedencia" placeholder="Procedencia">
</div>

<div class="row2">
<select id="clasificacion">
<option>RESERVADO</option>
<option>SECRETO</option>
<option>PÚBLICO</option>
</select>
<input id="archivo" placeholder="Archivo">
</div>

<div class="row2">
<select id="llegsal">
<option>LLEGADO</option>
<option>SALIDO</option>
</select>
<input id="observ" placeholder="Observación">
</div>

<div class="actions">
<button onclick="guardar()">GUARDAR</button>
<button class="sec" onclick="limpiar()">LIMPIAR</button>
</div>

</div>

<!-- =====================================================
MODULO 4
TABLA
===================================================== -->

<div class="panel">

<div class="stats">
<div class="card"><b id="res">0</b>Reservados</div>
<div class="card secret"><b id="sec">0</b>Secretos</div>
<div class="card"><b id="pub">0</b>Públicos</div>
<div class="card"><b id="total">0</b>Total</div>
<div class="card warning"><b id="porVencer">0</b>Por vencer</div>
</div>

<div class="search">
<input id="buscarNumero" placeholder="Buscar número">
<input type="date" id="buscarFecha">
<input id="buscarProcedencia" placeholder="Buscar procedencia">
</div>

<div class="export">
<button onclick="imprimirPDF()">PDF</button>
<button onclick="exportarExcel()">EXCEL</button>
</div>

<table id="tabla">
<thead>
<tr>
<th>FECHA</th>
<th>NUMERO</th>
<th>IDENT MATERIA</th>
<th>IDENT DOC</th>
<th>AUTORIDAD</th>
<th>EJS</th>
<th>HJS</th>
<th>MATERIA</th>
<th>PLAZO</th>
<th>DÍAS</th>
<th>PROCED</th>
<th>CLASIF</th>
<th>ARCH</th>
<th>L/S</th>
<th>OBS</th>
<th>ACCIONES</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>
</div>

<!-- =====================================================
MODULO 5 AL 15
LOGICA COMPLETA
===================================================== -->

<script>

const API_URL="https://script.google.com/macros/s/AKfycbydwtoJS_NSTKAKNA-Am69A1Po2-RE0YYTe01c0Pt-nlgBdWfDNjNxiIURKHXCe64RtX/exec"

let registros=JSON.parse(localStorage.getItem("registros"))||[]
let editIndex=null

function mayus(t){return (t||"").toUpperCase().trim()}

function diasNumero(pl){
if(!pl)return null
let hoy=new Date()
let f=new Date(pl)
return Math.floor((f-hoy)/86400000)
}

function guardar(){
let r={
fecha:fecha.value,
numero:mayus(numero.value),
identMateria:mayus(identMateria.value),
identDoc:mayus(identDoc.value),
autoridad:mayus(autoridad.value),
ejs:ejs.value,
hjs:hjs.value,
materia:mayus(materia.value),
plazo:plazo.value,
procedencia:mayus(procedencia.value),
clasificacion:mayus(clasificacion.value),
archivo:mayus(archivo.value),
llegsal:mayus(llegsal.value),
observ:mayus(observ.value)
}

if(editIndex!=null){
registros[editIndex]=r
editIndex=null
}else{
registros.push(r)
}

localStorage.setItem("registros",JSON.stringify(registros))
render()
limpiar()
}

function render(){
let tbody=document.querySelector("#tabla tbody")
tbody.innerHTML=""

let lista=registros.filter(r=>
(!buscarNumero.value || r.numero.includes(buscarNumero.value.toUpperCase())) &&
(!buscarFecha.value || r.fecha===buscarFecha.value) &&
(!buscarProcedencia.value || r.procedencia.includes(buscarProcedencia.value.toUpperCase()))
)

lista.forEach((r,i)=>{
let d=diasNumero(r.plazo)
let clase=""
if(d<0)clase="plazoVencido"
else if(d<=5)clase="plazoRojo"
else if(d<=15)clase="plazoVerde"
else clase="plazoAmarillo"

let tr=document.createElement("tr")
tr.innerHTML=`
<td>${r.fecha}</td>
<td>${r.numero}</td>
<td>${r.identMateria}</td>
<td>${r.identDoc}</td>
<td>${r.autoridad}</td>
<td>${r.ejs}</td>
<td>${r.hjs}</td>
<td>${r.materia}</td>
<td>${r.plazo}</td>
<td class="${clase}">${d}</td>
<td>${r.procedencia}</td>
<td>${r.clasificacion}</td>
<td>${r.archivo}</td>
<td>${r.llegsal}</td>
<td>${r.observ}</td>
<td>
<button onclick="editar(${i})">✏</button>
<button onclick="borrar(${i})">🗑</button>
</td>`
tbody.appendChild(tr)
})

actualizarResumen(lista)
}

function editar(i){
let r=registros[i]
Object.keys(r).forEach(k=>{ if(document.getElementById(k)) document.getElementById(k).value=r[k] })
editIndex=i
}

function borrar(i){
if(confirm("Eliminar registro?")){
registros.splice(i,1)
localStorage.setItem("registros",JSON.stringify(registros))
render()
}
}

function limpiar(){
document.querySelectorAll("input, textarea").forEach(e=>e.value="")
editIndex=null
}

function actualizarResumen(lista){
let res=0,sec=0,pub=0,vencer=0

lista.forEach(r=>{
if(r.clasificacion=="RESERVADO")res++
if(r.clasificacion=="SECRETO")sec++
if(r.clasificacion=="PÚBLICO")pub++

let d=diasNumero(r.plazo)
if(d>=0 && d<=5)vencer++
})

document.getElementById("res").innerText=res
document.getElementById("sec").innerText=sec
document.getElementById("pub").innerText=pub
document.getElementById("total").innerText=lista.length
document.getElementById("porVencer").innerText=vencer
}

function imprimirPDF(){window.print()}

function exportarExcel(){
let ws=XLSX.utils.json_to_sheet(registros)
let wb=XLSX.utils.book_new()
XLSX.utils.book_append_sheet(wb,ws,"Datos")
XLSX.writeFile(wb,"registro.xlsx")
}

buscarNumero.addEventListener("input",render)
buscarFecha.addEventListener("input",render)
buscarProcedencia.addEventListener("input",render)

window.onload=render

</script>

</body>
</html>
