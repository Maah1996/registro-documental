<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>REGISTRO DOCUMENTAL</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:"Segoe UI",Arial;
background:#eef2f6;
padding:20px;
margin:0;
}

h1{
text-align:center;
margin-bottom:15px;
color:#2c3e50;
}

.layout{
display:flex;
gap:15px;
}

.panel{
background:white;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.left{
width:320px;
padding:12px;
}

.right{
flex:1;
padding:12px;
}

label{
font-size:12px;
font-weight:600;
margin-top:6px;
display:block;
}

input,select,textarea{
width:100%;
padding:6px;
margin-top:3px;
margin-bottom:6px;
font-size:12px;
border:1px solid #ccd3db;
border-radius:4px;
box-sizing:border-box;
}

textarea{
height:60px;
resize:none;
}

button{
background:#34495e;
color:white;
cursor:pointer;
border:none;
padding:6px;
border-radius:4px;
}

button:hover{
background:#2c3e50;
}

.tools{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-bottom:10px;
align-items:center;
}

.tools input{
width:120px;
}

.busquedaTitulo{
font-weight:bold;
margin-right:8px;
}

.export{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:10px;
}

.stats{
display:flex;
gap:10px;
margin-bottom:10px;
}

.card{
background:#f8fafc;
padding:8px;
border-radius:6px;
text-align:center;
flex:1;
}

.card b{
display:block;
font-size:18px;
}

table{
width:100%;
border-collapse:collapse;
font-size:11px;
}

th,td{
border:1px solid #d8dee6;
padding:6px;
text-align:center;
}

th{
background:#e8edf3;
}

.rojo{
background:#e74c3c;
color:white;
font-weight:bold;
padding:3px 6px;
border-radius:3px;
display:inline-block;
min-width:22px;
}

.naranja{
background:#f39c12;
padding:3px 6px;
border-radius:3px;
display:inline-block;
min-width:22px;
}

.amarillo{
background:#f1c40f;
padding:3px 6px;
border-radius:3px;
display:inline-block;
min-width:22px;
}

.verde{
background:#2ecc71;
padding:3px 6px;
border-radius:3px;
display:inline-block;
min-width:22px;
}

</style>
</head>

<body>

<h1>REGISTRO DOCUMENTAL</h1>

<div class="layout">

<div class="panel left">

<label>Fecha Doc</label>
<input type="date" id="fecha">

<label>Número</label>
<input id="numero">

<label>Ident. Materia</label>
<input id="identMateria">

<label>Ident. Documento</label>
<input id="identDoc">

<label>Autoridad que firma</label>
<input id="autoridad">

<label>Cant Ejs</label>
<input id="ejs">

<label>Cant Hjs</label>
<input id="hjs">

<label>Materia</label>
<textarea id="materia"></textarea>

<label>Plazo</label>
<input type="date" id="plazo">

<label>Procedencia</label>
<input id="procedencia">

<label>Clasificación</label>
<select id="clasificacion">
<option>RESERVADO</option>
<option>SECRETO</option>
<option>PUBLICO</option>
</select>

<label>Archivo</label>
<input id="archivo">

<label>Lleg/Sal</label>
<select id="llegsal">
<option>LLEGADO</option>
<option>SALIDO</option>
</select>

<label>Observ</label>
<input id="observ">

<button onclick="guardar()">GUARDAR</button>
<button onclick="limpiar()">LIMPIAR</button>

</div>

<div class="panel right">

<div class="stats">

<div class="card"><b id="total">0</b>TOTAL</div>
<div class="card"><b id="res">0</b>RESERVADOS</div>
<div class="card"><b id="sec">0</b>SECRETOS</div>
<div class="card"><b id="pub">0</b>PUBLICOS</div>
<div class="card"><b id="vencer">0</b>POR VENCER</div>
<div class="card"><b id="venc">0</b>VENCIDOS</div>

</div>

<div class="tools">

<div class="busquedaTitulo">BUSCADOR</div>

<input id="buscarNumero" placeholder="Número">
<input type="date" id="buscarFecha">
<input id="buscarProcedencia" placeholder="Procedencia">
<input id="buscarArchivo" placeholder="Archivo">
<input id="buscarAnio" placeholder="Año">

</div>

<div class="export">
<button onclick="imprimirPDF()">PDF</button>
<button onclick="exportarExcel()">EXCEL</button>
</div>

<table id="tabla">

<thead>
<tr>
<th>FECHA</th>
<th>NUMERO</th>
<th>IDENT MATERIA</th>
<th>IDENT DOC</th>
<th>AUTORIDAD</th>
<th>EJS</th>
<th>HJS</th>
<th>MATERIA</th>
<th>PLAZO</th>
<th>DÍAS</th>
<th>PROCED</th>
<th>CLASIF</th>
<th>ARCH</th>
<th>L/S</th>
<th>OBS</th>
<th>ACCIONES</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbx3dVB_vdPg27VmlM6I7mm9wCEY8gVJipxkQvtL6zg3PV4cRhxZaDmEpbuI-PhPmu-n/exec"

let registros=[]
let editIndex=null

function enviarAScript(datos){
fetch(API_URL,{
method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(datos)
}).catch(function(e){
console.log("Error enviando a Google Sheets",e)
})
}

/* REFERENCIAS A CAMPOS */
const fecha = document.getElementById("fecha")
const numero = document.getElementById("numero")
const identMateria = document.getElementById("identMateria")
const identDoc = document.getElementById("identDoc")
const autoridad = document.getElementById("autoridad")
const ejs = document.getElementById("ejs")
const hjs = document.getElementById("hjs")
const materia = document.getElementById("materia")
const plazo = document.getElementById("plazo")
const procedencia = document.getElementById("procedencia")
const clasificacion = document.getElementById("clasificacion")
const archivo = document.getElementById("archivo")
const llegsal = document.getElementById("llegsal")
const observ = document.getElementById("observ")

const buscarNumero = document.getElementById("buscarNumero")
const buscarFecha = document.getElementById("buscarFecha")
const buscarProcedencia = document.getElementById("buscarProcedencia")
const buscarArchivo = document.getElementById("buscarArchivo")
const buscarAnio = document.getElementById("buscarAnio")

const total = document.getElementById("total")
const res = document.getElementById("res")
const sec = document.getElementById("sec")
const pub = document.getElementById("pub")
const vencer = document.getElementById("vencer")
const venc = document.getElementById("venc")

try{
registros=JSON.parse(localStorage.getItem("registros"))||[]
}catch{
registros=[]
}

function mayus(t){
return (t||"").toUpperCase().trim()
}

function fechaCL(f){
if(!f)return ""
let p=f.split("-")
return `${p[2]}-${p[1]}-${p[0]}`
}

function anioDeFecha(f){
return f.split("-")[0]
}

function dias(pl){

if(!pl)return ""

let hoy=new Date()
hoy.setHours(0,0,0,0)

let p=pl.split("-")
let f=new Date(p[0],p[1]-1,p[2])
f.setHours(0,0,0,0)

let d=Math.floor((f-hoy)/86400000)

if(d<0)return '<span class="verde"> </span>'
if(d<=5)return `<span class="rojo">${d}</span>`
if(d<=20)return `<span class="naranja">${d}</span>`
return `<span class="amarillo">${d}</span>`

}

function guardar(){

let r={
fecha:fecha.value,
numero:mayus(numero.value),
identMateria:mayus(identMateria.value),
identDoc:mayus(identDoc.value),
autoridad:mayus(autoridad.value),
ejs:ejs.value,
hjs:hjs.value,
materia:mayus(materia.value),
plazo:plazo.value,
procedencia:mayus(procedencia.value),
clasificacion:mayus(clasificacion.value),
archivo:mayus(archivo.value),
llegsal:mayus(llegsal.value),
observ:mayus(observ.value)
}

if(!r.fecha || !r.numero){
return
}

if(editIndex!==null){
registros[editIndex]=r
editIndex=null
}else{
registros.push(r)
}

localStorage.setItem("registros",JSON.stringify(registros))

enviarAScript(r)

render()
limpiar()

}

function limpiar(){
document.querySelectorAll(".left input,.left textarea").forEach(i=>i.value="")
clasificacion.value="RESERVADO"
llegsal.value="LLEGADO"
editIndex=null
}

function editar(i){

let r=registros[i]

fecha.value=r.fecha
numero.value=r.numero
identMateria.value=r.identMateria
identDoc.value=r.identDoc
autoridad.value=r.autoridad
ejs.value=r.ejs
hjs.value=r.hjs
materia.value=r.materia
plazo.value=r.plazo
procedencia.value=r.procedencia
clasificacion.value=r.clasificacion
archivo.value=r.archivo
llegsal.value=r.llegsal
observ.value=r.observ

editIndex=i

}

function borrar(i){

if(confirm("¿Eliminar registro?")){
registros.splice(i,1)
localStorage.setItem("registros",JSON.stringify(registros))
render()
}

}

function render(){

let tbody=document.querySelector("#tabla tbody")
tbody.innerHTML=""

let lista=[...registros]

let resCount=0
let secCount=0
let pubCount=0
let vencerCount=0
let vencCount=0

lista.forEach(r=>{

let clas=(r.clasificacion||"").trim().toUpperCase()

if(clas==="RESERVADO") resCount++
if(clas==="SECRETO") secCount++
if(clas==="PUBLICO") pubCount++

let p=(r.plazo||"").split("-")
if(p.length===3){
let hoy=new Date()
hoy.setHours(0,0,0,0)
let f=new Date(p[0],p[1]-1,p[2])
f.setHours(0,0,0,0)
let d=Math.floor((f-hoy)/86400000)
if(d>=0 && d<=5) vencerCount++
if(d<0) vencCount++
}

})

let fNumero=buscarNumero.value.toUpperCase()
let fFecha=buscarFecha.value
let fProc=buscarProcedencia.value.toUpperCase()
let fArch=buscarArchivo.value.toUpperCase()
let fAnio=buscarAnio.value

lista.forEach((r,i)=>{

if(
(fNumero && !String(r.numero||"").toUpperCase().includes(fNumero)) ||
(fFecha && r.fecha!==fFecha) ||
(fProc && !String(r.procedencia||"").toUpperCase().includes(fProc)) ||
(fArch && !String(r.archivo||"").toUpperCase().includes(fArch)) ||
(fAnio && anioDeFecha(r.fecha)!==fAnio)
){
return
}

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${fechaCL(r.fecha)}</td>
<td>${r.numero}</td>
<td>${r.identMateria}</td>
<td>${r.identDoc}</td>
<td>${r.autoridad}</td>
<td>${r.ejs}</td>
<td>${r.hjs}</td>
<td>${r.materia}</td>
<td>${fechaCL(r.plazo)}</td>
<td>${dias(r.plazo)}</td>
<td>${r.procedencia}</td>
<td>${r.clasificacion}</td>
<td>${r.archivo}</td>
<td>${r.llegsal}</td>
<td>${r.observ}</td>
<td>
<button onclick="editar(${i})">✏</button>
<button onclick="borrar(${i})">🗑</button>
</td>
`

tbody.appendChild(tr)

})

total.textContent=registros.length
res.textContent=resCount
sec.textContent=secCount
pub.textContent=pubCount
vencer.textContent=vencerCount
venc.textContent=vencCount

}

function imprimirPDF(){

let lista=[...registros]

let html=`
<h2 style="text-align:center">REGISTRO DOCUMENTAL</h2>
<table border="1" style="border-collapse:collapse;margin:auto;text-align:center">
<tr style="height:35px">
<th style="width:120px">FECHA</th>
<th style="width:120px">NUMERO</th>
<th style="width:140px">IDENT MATERIA</th>
<th style="width:140px">IDENT DOC</th>
<th style="width:180px">AUTORIDAD</th>
<th style="width:80px">EJS</th>
<th style="width:80px">HJS</th>
<th style="width:200px">MATERIA</th>
</tr>
`

lista.forEach(r=>{
html+=`
<tr style="height:28px">
<td>${fechaCL(r.fecha)}</td>
<td>${r.numero}</td>
<td>${r.identMateria}</td>
<td>${r.identDoc}</td>
<td>${r.autoridad}</td>
<td>${r.ejs}</td>
<td>${r.hjs}</td>
<td>${r.materia}</td>
</tr>`
})

html+="</table>"

let w=window.open("")
w.document.write(html)
w.document.close()
w.focus()
w.print()

}

function exportarExcel(){

let data=[
["FECHA","NUMERO","IDENT MATERIA","IDENT DOC","AUTORIDAD","EJS","HJS","MATERIA"]
]

registros.forEach(r=>{
data.push([
fechaCL(r.fecha),
r.numero,
r.identMateria,
r.identDoc,
r.autoridad,
r.ejs,
r.hjs,
r.materia
])
})

let ws=XLSX.utils.aoa_to_sheet(data)
let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Registro")

XLSX.writeFile(wb,"registro_documental.xlsx")

}

buscarNumero.oninput=render
buscarFecha.oninput=render
buscarProcedencia.oninput=render
buscarArchivo.oninput=render
buscarAnio.oninput=render

render()

</script>

</body>
</html>
