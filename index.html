<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REGISTRO DOCUMENTAL</title>
<link rel="icon" type="image/png" href="icono.png">
<link rel="apple-touch-icon" href="icono.png">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:"Segoe UI",Arial,sans-serif;
background:#dfeaf5;
margin:0;
padding:20px;
color:#243447;
}

h1{
text-align:center;
margin:0 0 18px 0;
color:#243447;
}

h3{
text-align:center;
margin:0 0 12px 0;
color:#243447;
font-size:18px;
}

.layout{
display:grid;
grid-template-columns:320px 1fr;
gap:18px;
align-items:start;
}

.panel{
background:#fff;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
padding:16px;
}

label{
display:block;
font-size:12px;
font-weight:700;
margin-top:8px;
}

input,select,textarea{
width:100%;
box-sizing:border-box;
margin-top:4px;
padding:8px 10px;
border:1px solid #cfd8e3;
border-radius:8px;
font-size:13px;
background:#fff;
}

textarea{
min-height:68px;
resize:vertical;
}

.row2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.actions{
display:flex;
gap:8px;
margin-top:12px;
}

button{
border:none;
border-radius:8px;
padding:9px 12px;
cursor:pointer;
background:#34495e;
color:#fff;
font-weight:600;
}

button:hover{
background:#2c3e50;
}

button.sec{
background:#7f8c8d;
}

button.sec:hover{
background:#667071;
}

/* ===== TARJETAS ===== */

.stats{
display:grid;
grid-template-columns:repeat(5,minmax(120px,1fr));
gap:10px;
margin-bottom:12px;
}

.card{
background:#f7fafc;
border:1px solid #e5edf5;
border-radius:10px;
padding:10px;
text-align:center;
}

.card b{
display:block;
font-size:22px;
margin-bottom:4px;
}

.card.secret{
border-color:#f4c7c3;
background:#fff5f5;
}

.card.secret b{
color:#c0392b;
}

.card.warning{
border-color:#f7dc6f;
background:#fffbea;
}

.card.warning b{
color:#b9770e;
}

/* ===== BUSQUEDA ===== */

.search{
display:grid;
grid-template-columns:repeat(3,minmax(160px,1fr));
gap:10px;
margin-bottom:12px;
}

.export{
display:flex;
gap:8px;
justify-content:flex-end;
margin-bottom:10px;
}

/* ===== TABLA ===== */

.table-wrap{
overflow:auto;
border:1px solid #e3e9ef;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
background:#fff;
}

th,td{
border:1px solid #e5edf5;
padding:8px 6px;
text-align:center;
vertical-align:middle;
}

th{
background:#eef4f9;
position:sticky;
top:0;
z-index:1;
}

/* ===== COLORES PLAZO ===== */

.plazoRojo{
background:#ff3b30;
color:#fff;
font-weight:700;
}

.plazoVerde{
background:#b9f6ca;
color:#000;
font-weight:700;
}

.plazoAmarillo{
background:#fff176;
color:#000;
font-weight:700;
}

.plazoVencido{
background:#b3e5fc;
color:#000;
font-weight:700;
}

/* ===== CLASIFICACION ===== */

.secret-cell{
background:#c0392b;
color:#fff;
font-weight:700;
}

.muted{
color:#6b7b8c;
font-size:12px;
}

</style>
</head>

<body>

<h1>REGISTRO DOCUMENTAL</h1>

<div class="layout">

<!-- MODULO 0 FORMULARIO -->

<div class="panel left">

<h3>REGISTRAR AQUÍ</h3>

<label>Fecha Doc</label>
<input type="date" id="fecha">

<label>Número</label>
<input id="numero">

<div class="row2">
<div>
<label>Ident. Materia</label>
<input id="identMateria">
</div>
<div>
<label>Ident. Documento</label>
<input id="identDoc">
</div>
</div>

<label>Autoridad</label>
<input id="autoridad">

<div class="row2">
<div>
<label>Cant. Ejs</label>
<input id="ejs">
</div>
<div>
<label>Cant. Hjs</label>
<input id="hjs">
</div>
</div>

<label>Materia</label>
<textarea id="materia"></textarea>

<div class="row2">
<div>
<label>Plazo</label>
<input type="date" id="plazo">
</div>
<div>
<label>Procedencia</label>
<input id="procedencia">
</div>
</div>

<div class="row2">
<div>
<label>Clasificación</label>
<select id="clasificacion">
<option>RESERVADO</option>
<option>SECRETO</option>
<option>PÚBLICO</option>
</select>
</div>
<div>
<label>Archivo</label>
<input id="archivo">
</div>
</div>

<div class="row2">
<div>
<label>Lleg/Sal</label>
<select id="llegsal">
<option>LLEGADO</option>
<option>SALIDO</option>
</select>
</div>
<div>
<label>Observ</label>
<input id="observ">
</div>
</div>

<div class="actions">
<button onclick="guardar()">GUARDAR</button>
<button class="sec" onclick="limpiar()">LIMPIAR</button>
</div>

<div class="muted">La URL del Apps Script se pega en el MODULO 2.</div>

</div>

<!-- MODULO TABLA -->

<div class="panel right">

<div class="stats">
<div class="card"><b id="res">0</b>Reservados</div>
<div class="card secret"><b id="sec">0</b>Secretos</div>
<div class="card"><b id="pub">0</b>Públicos</div>
<div class="card"><b id="total">0</b>Total</div>
<div class="card warning"><b id="porVencer">0</b>Por vencer</div>
</div>

<div class="search">
<input id="buscarNumero" placeholder="Buscar número">
<input type="date" id="buscarFecha">
<input id="buscarProcedencia" placeholder="Buscar procedencia">
</div>

<div class="export">
<button class="sec" onclick="imprimirPDF()">PDF</button>
<button class="sec" onclick="exportarExcel()">EXCEL</button>
</div>

<div class="table-wrap">

<table id="tabla">

<thead>

<tr>
<th>FECHA</th>
<th>NUMERO</th>
<th>IDENT MATERIA</th>
<th>IDENT DOC</th>
<th>AUTORIDAD</th>
<th>EJS</th>
<th>HJS</th>
<th>MATERIA</th>
<th>PLAZO</th>
<th>DÍAS</th>
<th>PROCED</th>
<th>CLASIF</th>
<th>ARCH</th>
<th>L/S</th>
<th>OBS</th>
<th>ACCIONES</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

</div>

<script>

/* MODULO 1 VARIABLES */

const fecha=document.getElementById("fecha")
const numero=document.getElementById("numero")
const identMateria=document.getElementById("identMateria")
const identDoc=document.getElementById("identDoc")
const autoridad=document.getElementById("autoridad")
const ejs=document.getElementById("ejs")
const hjs=document.getElementById("hjs")
const materia=document.getElementById("materia")
const plazo=document.getElementById("plazo")
const procedencia=document.getElementById("procedencia")
const clasificacion=document.getElementById("clasificacion")
const archivo=document.getElementById("archivo")
const llegsal=document.getElementById("llegsal")
const observ=document.getElementById("observ")

const buscarNumero=document.getElementById("buscarNumero")
const buscarFecha=document.getElementById("buscarFecha")
const buscarProcedencia=document.getElementById("buscarProcedencia")

/* MODULO 2 SISTEMA */

const API_URL="PEGA_AQUI_TU_URL_EXEC"

let registros=[]
let editIndex=null

/* MODULO 3 CARGA LOCAL */

try{
registros=JSON.parse(localStorage.getItem("registros"))||[]
}catch{
registros=[]
}

/* MODULO 4 FUNCIONES */

function mayus(t){

t=(t||"").toUpperCase().trim()

t=t.replace("PUBLICO","PÚBLICO")

return t
}

function fechaCL(f){
if(!f) return ""
let p=f.split("-")
return `${p[2]}-${p[1]}-${p[0]}`
}

function diasNumero(pl){

if(!pl) return null

let hoy=new Date()
hoy.setHours(0,0,0,0)

let p=pl.split("-")

let f=new Date(p[0],p[1]-1,p[2])

return Math.floor((f-hoy)/86400000)

}

/* MODULO 5 GUARDAR */

function guardar(){

let r={

fecha:fecha.value,
numero:mayus(numero.value),
identMateria:mayus(identMateria.value),
identDoc:mayus(identDoc.value),
autoridad:mayus(autoridad.value),
ejs:ejs.value,
hjs:hjs.value,
materia:mayus(materia.value),
plazo:plazo.value,
procedencia:mayus(procedencia.value),
clasificacion:mayus(clasificacion.value),
archivo:mayus(archivo.value),
llegsal:mayus(llegsal.value),
observ:mayus(observ.value)

}

if(editIndex!==null){
registros[editIndex]=r
editIndex=null
}else{
registros.push(r)
}

localStorage.setItem("registros",JSON.stringify(registros))

render()
limpiar()

}

/* MODULO 6 ENVIAR */

function enviarAScript(datos){

if(!API_URL || API_URL==="PEGA_AQUI_TU_URL_EXEC") return

fetch(API_URL,{
method:"POST",
mode:"no-cors",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(datos)
})

}

/* MODULO 7 EDITAR BORRAR */

function editar(i){

let r=registros[i]

fecha.value=r.fecha
numero.value=r.numero
identMateria.value=r.identMateria
identDoc.value=r.identDoc
autoridad.value=r.autoridad
ejs.value=r.ejs
hjs.value=r.hjs
materia.value=r.materia
plazo.value=r.plazo
procedencia.value=r.procedencia
clasificacion.value=r.clasificacion
archivo.value=r.archivo
llegsal.value=r.llegsal
observ.value=r.observ

editIndex=i

}

function borrar(i){

if(confirm("¿Eliminar registro?")){

registros.splice(i,1)

localStorage.setItem("registros",JSON.stringify(registros))

render()

}

}

/* MODULO 8 RENDER */

function render(){

let tbody=document.querySelector("#tabla tbody")

tbody.innerHTML=""

let lista=[...registros]

lista.forEach((r,i)=>{

let claseClasif=r.clasificacion==="SECRETO"?"secret-cell":""

let d=diasNumero(r.plazo)

let clasePlazo=""
let textoDia=""

if(d===null){
clasePlazo=""
textoDia=""
}else if(d<0){
clasePlazo="plazoVencido"
textoDia=""
}else if(d<=5){
clasePlazo="plazoRojo"
textoDia=d
}else if(d<=15){
clasePlazo="plazoVerde"
textoDia=d
}else{
clasePlazo="plazoAmarillo"
textoDia=d
}

let tr=document.createElement("tr")

tr.innerHTML=`

<td>${fechaCL(r.fecha)}</td>
<td>${r.numero}</td>
<td>${r.identMateria}</td>
<td>${r.identDoc}</td>
<td>${r.autoridad}</td>
<td>${r.ejs}</td>
<td>${r.hjs}</td>
<td>${r.materia}</td>
<td>${fechaCL(r.plazo)}</td>
<td class="${clasePlazo}">${textoDia}</td>
<td>${r.procedencia}</td>
<td class="${claseClasif}">${r.clasificacion}</td>
<td>${r.archivo}</td>
<td>${r.llegsal}</td>
<td>${r.observ}</td>

<td>
<button onclick="editar(${i})">✏</button>
<button onclick="borrar(${i})">🗑</button>
</td>

`

tbody.appendChild(tr)

})

actualizarResumen()

}

/* MODULO 9 PDF */

function imprimirPDF(){

let lista=[...registros]

let html=`<html><head><style>
body{font-family:Arial;padding:20px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #000;padding:6px;text-align:center}
</style></head><body>
<h2 style="text-align:center">REGISTRO DOCUMENTAL</h2>
<table>
<tr>
<th>FECHA</th>
<th>NUMERO</th>
<th>IDENT MATERIA</th>
<th>IDENT DOC</th>
<th>AUTORIDAD</th>
<th>EJS</th>
<th>HJS</th>
<th>MATERIA</th>
</tr>
`

lista.forEach(r=>{

html+=`<tr>
<td>${fechaCL(r.fecha)}</td>
<td>${r.numero}</td>
<td>${r.identMateria}</td>
<td>${r.identDoc}</td>
<td>${r.autoridad}</td>
<td>${r.ejs}</td>
<td>${r.hjs}</td>
<td>${r.materia}</td>
</tr>`

})

html+=`</table></body></html>`

let w=window.open("")

w.document.write(html)

w.document.close()

w.focus()

w.print()

}

/* MODULO 10 EXCEL */

function exportarExcel(){

let data=[["FECHA","NUMERO","IDENT MATERIA","IDENT DOC","AUTORIDAD","EJS","HJS","MATERIA"]]

registros.forEach(r=>{

data.push([
fechaCL(r.fecha),
r.numero,
r.identMateria,
r.identDoc,
r.autoridad,
r.ejs,
r.hjs,
r.materia
])

})

let ws=XLSX.utils.aoa_to_sheet(data)
let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Registro")

XLSX.writeFile(wb,"registro_documental.xlsx")

}

/* MODULO 11 RESUMEN */

function actualizarResumen(){

document.getElementById("total").textContent=registros.length
document.getElementById("res").textContent=registros.filter(x=>x.clasificacion==="RESERVADO").length
document.getElementById("sec").textContent=registros.filter(x=>x.clasificacion==="SECRETO").length
document.getElementById("pub").textContent=registros.filter(x=>x.clasificacion==="PÚBLICO" || x.clasificacion==="PUBLICO").length

let vencen=registros.filter(x=>{
let d=diasNumero(x.plazo)
return d!==null && d>=0 && d<=5
}).length

document.getElementById("porVencer").textContent=vencen

}

/* MODULO 12 INICIO */

buscarNumero.addEventListener("input",render)
buscarFecha.addEventListener("input",render)
buscarProcedencia.addEventListener("input",render)

window.onload=function(){
render()
}

</script>

</body>
</html>
