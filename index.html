<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>REGISTRO DOCUMENTAL</title>

<style>

body{
font-family:Segoe UI,Arial;
background:#eef2f6;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#2c3e50;
}

.layout{
display:flex;
gap:20px;
margin-top:20px;
}

.panel{
background:white;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
padding:15px;
}

.left{
width:300px;
}

.right{
flex:1;
}

label{
font-size:12px;
font-weight:bold;
display:block;
margin-top:6px;
}

input,select,textarea{
width:100%;
padding:6px;
margin-top:3px;
font-size:12px;
border:1px solid #ccc;
border-radius:4px;
}

textarea{
height:60px;
}

button{
margin-top:6px;
padding:6px;
background:#34495e;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#2c3e50;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
}

th{
background:#e9edf2;
}

.rojo{background:#e74c3c;color:white;padding:3px;border-radius:3px}
.naranja{background:#f39c12;padding:3px;border-radius:3px}
.amarillo{background:#f1c40f;padding:3px;border-radius:3px}
.verde{background:#2ecc71;padding:3px;border-radius:3px}

</style>

</head>

<body>

<h1>REGISTRO DOCUMENTAL</h1>

<div class="layout">

<!-- =====================================================
MODULO 0
INTERFAZ VISUAL (FORMULARIO)
===================================================== -->

<div class="panel left">

<label>Fecha</label>
<input type="date" id="fecha">

<label>Número</label>
<input id="numero">

<label>Ident Materia</label>
<input id="identMateria">

<label>Ident Documento</label>
<input id="identDoc">

<label>Autoridad</label>
<input id="autoridad">

<label>Ejs</label>
<input id="ejs">

<label>Hjs</label>
<input id="hjs">

<label>Materia</label>
<textarea id="materia"></textarea>

<label>Plazo</label>
<input type="date" id="plazo">

<label>Procedencia</label>
<input id="procedencia">

<label>Clasificación</label>
<select id="clasificacion">
<option>RESERVADO</option>
<option>SECRETO</option>
<option>PUBLICO</option>
</select>

<label>Archivo</label>
<input id="archivo">

<label>Lleg/Sal</label>
<select id="llegsal">
<option>LLEGADO</option>
<option>SALIDO</option>
</select>

<label>Observ</label>
<input id="observ">

<button onclick="guardar()">GUARDAR</button>
<button onclick="limpiar()">LIMPIAR</button>

</div>

<!-- =====================================================
MODULO 0B
TABLA DEL SISTEMA
===================================================== -->

<div class="panel right">

<table id="tabla">

<thead>
<tr>
<th>FECHA</th>
<th>NUMERO</th>
<th>IDENT MATERIA</th>
<th>IDENT DOC</th>
<th>AUTORIDAD</th>
<th>EJS</th>
<th>HJS</th>
<th>MATERIA</th>
<th>PLAZO</th>
<th>DÍAS</th>
<th>PROCED</th>
<th>CLASIF</th>
<th>ARCH</th>
<th>L/S</th>
<th>OBS</th>
<th>ACCIONES</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>
</div>

<script>

/* =====================================================
MODULO 1
RECEPCION DE INFORMACION
===================================================== */

const fecha=document.getElementById("fecha")
const numero=document.getElementById("numero")
const identMateria=document.getElementById("identMateria")
const identDoc=document.getElementById("identDoc")
const autoridad=document.getElementById("autoridad")
const ejs=document.getElementById("ejs")
const hjs=document.getElementById("hjs")
const materia=document.getElementById("materia")
const plazo=document.getElementById("plazo")
const procedencia=document.getElementById("procedencia")
const clasificacion=document.getElementById("clasificacion")
const archivo=document.getElementById("archivo")
const llegsal=document.getElementById("llegsal")
const observ=document.getElementById("observ")

/* =====================================================
MODULO 2
VARIABLES DEL SISTEMA
===================================================== */

let registros=[]
let editIndex=null

/* =====================================================
MODULO 3
CARGA LOCAL DE DATOS
===================================================== */

try{
registros=JSON.parse(localStorage.getItem("registros"))||[]
}catch{
registros=[]
}

/* =====================================================
MODULO 4
PROCESAMIENTO
===================================================== */

function mayus(t){
return (t||"").toUpperCase().trim()
}

function fechaCL(f){
if(!f)return ""
let p=f.split("-")
return `${p[2]}-${p[1]}-${p[0]}`
}

function dias(pl){

if(!pl)return ""

let hoy=new Date()
hoy.setHours(0,0,0,0)

let p=pl.split("-")
let f=new Date(p[0],p[1]-1,p[2])
f.setHours(0,0,0,0)

let d=Math.floor((f-hoy)/86400000)

if(d<0)return '<span class="verde"></span>'
if(d<=5)return `<span class="rojo">${d}</span>`
if(d<=20)return `<span class="naranja">${d}</span>`
return `<span class="amarillo">${d}</span>`

}

/* =====================================================
MODULO 5
GUARDAR DOCUMENTOS
===================================================== */

function guardar(){

let r={
fecha:fecha.value,
numero:mayus(numero.value),
identMateria:mayus(identMateria.value),
identDoc:mayus(identDoc.value),
autoridad:mayus(autoridad.value),
ejs:ejs.value,
hjs:hjs.value,
materia:mayus(materia.value),
plazo:plazo.value,
procedencia:mayus(procedencia.value),
clasificacion:mayus(clasificacion.value),
archivo:mayus(archivo.value),
llegsal:mayus(llegsal.value),
observ:mayus(observ.value)
}

if(!r.fecha || !r.numero)return

if(editIndex!=null){
registros[editIndex]=r
editIndex=null
}else{
registros.push(r)
}

localStorage.setItem("registros",JSON.stringify(registros))

render()
limpiar()

}

/* =====================================================
MODULO 7
EDICION Y BORRADO
===================================================== */

function editar(i){

let r=registros[i]

fecha.value=r.fecha
numero.value=r.numero
identMateria.value=r.identMateria
identDoc.value=r.identDoc
autoridad.value=r.autoridad
ejs.value=r.ejs
hjs.value=r.hjs
materia.value=r.materia
plazo.value=r.plazo
procedencia.value=r.procedencia
clasificacion.value=r.clasificacion
archivo.value=r.archivo
llegsal.value=r.llegsal
observ.value=r.observ

editIndex=i

}

function borrar(i){

if(confirm("¿Eliminar registro?")){
registros.splice(i,1)
localStorage.setItem("registros",JSON.stringify(registros))
render()
}

}

/* =====================================================
MODULO 8
VISUALIZACION DE REGISTROS
===================================================== */

function render(){

let tbody=document.querySelector("#tabla tbody")

if(!tbody)return

tbody.innerHTML=""

/* ORDEN POR FECHA (ULTIMO ARRIBA) */

registros.sort((a,b)=> new Date(b.fecha)-new Date(a.fecha))

registros.forEach((r,i)=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${fechaCL(r.fecha)}</td>
<td>${r.numero}</td>
<td>${r.identMateria}</td>
<td>${r.identDoc}</td>
<td>${r.autoridad}</td>
<td>${r.ejs}</td>
<td>${r.hjs}</td>
<td>${r.materia}</td>
<td>${fechaCL(r.plazo)}</td>
<td>${dias(r.plazo)}</td>
<td>${r.procedencia}</td>
<td>${r.clasificacion}</td>
<td>${r.archivo}</td>
<td>${r.llegsal}</td>
<td>${r.observ}</td>
<td>
<button onclick="editar(${i})">✏</button>
<button onclick="borrar(${i})">🗑</button>
</td>
`

tbody.appendChild(tr)

})

}

/* =====================================================
MODULO 10
LIMPIEZA
===================================================== */

function limpiar(){
document.querySelectorAll(".left input,.left textarea").forEach(i=>i.value="")
clasificacion.value="RESERVADO"
llegsal.value="LLEGADO"
editIndex=null
}

/* =====================================================
MODULO 11
INICIO
===================================================== */

window.onload=function(){
render()
}

</script>

</body>
</html>
